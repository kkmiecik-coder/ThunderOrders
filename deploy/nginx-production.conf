# Production nginx config dla ThunderOrders
# Plik docelowy: /etc/nginx/sites-available/thunderorders
#
# Zmiany vs poprzedniej wersji (sprzed Fazy 1):
# 1. Dodany upstream block z ip_hash → sticky session dla multi-worker gunicorn
# 2. proxy_pass przez nazwę upstream zamiast bezpośredniego 127.0.0.1:8000
# 3. Dodane proxy_buffering off + proxy_send_timeout dla /socket.io/
#
# WAŻNE: To jest TEMPLATE — produkcja ma SSL/Let's Encrypt (zarządzane przez certbot)
# i sekcje "managed by Certbot" NIE wolno modyfikować ręcznie. Aplikuj zmiany SELEKTYWNIE
# (tylko upstream block + dwa proxy_pass + 2 dyrektywy w /socket.io/).

upstream thunderorders {
    # Sticky session — klient zawsze trafia na tego samego workera Gunicorn.
    # KRYTYCZNE dla Socket.IO (WS connections są długo żyjące i workery
    # trzymają stan sesji w pamięci procesu — patrz modules/offers/redis_state.py).
    ip_hash;
    server 127.0.0.1:8000;
}

server {
    server_name thunderorders.cloud;

    client_max_body_size 50M;

    location /static/ {
        alias /var/www/ThunderOrders/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        alias /var/www/ThunderOrders/static/uploads/;
        expires 30d;
    }

    # phpMyAdmin — bez zmian (zostawić jak było)
    location /admin/db/phpmyadmin {
        alias /usr/share/phpmyadmin;
        index index.php;

        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location ~ ^/admin/db/phpmyadmin/(.+\.php)$ {
            alias /usr/share/phpmyadmin/$1;
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }

        location ~* ^/admin/db/phpmyadmin/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt))$ {
            alias /usr/share/phpmyadmin/$1;
        }
    }

    # HTTP — proxy do upstream (sticky session)
    location / {
        proxy_pass http://thunderorders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # WebSocket — upgrade + długi timeout + brak bufferowania
    location /socket.io/ {
        proxy_pass http://thunderorders/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/thunderorders.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/thunderorders.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Sekcje poniżej — BEZ ZMIAN — zarządzane przez Certbot
# (zachowane tylko dla kompletności referencji)

server {
    if ($host = www.thunderorders.cloud) {
        return 301 https://$host$request_uri;
    }

    if ($host = thunderorders.cloud) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name thunderorders.cloud www.thunderorders.cloud;
    return 404;
}

server {
    listen 443 ssl;
    server_name www.thunderorders.cloud;

    ssl_certificate /etc/letsencrypt/live/thunderorders.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thunderorders.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://thunderorders.cloud$request_uri;
}
