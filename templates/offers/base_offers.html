<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}ThunderOrders{% endblock %}</title>

    <!-- Google Analytics 4 (GA4) - Warunkowe ładowanie zgodne z RODO -->
    {% if config.GA_MEASUREMENT_ID %}
    <script>
        // Funkcja ładująca GA4
        function loadGoogleAnalytics() {
            const script = document.createElement('script');
            script.async = true;
            script.src = 'https://www.googletagmanager.com/gtag/js?id={{ config.GA_MEASUREMENT_ID }}';
            document.head.appendChild(script);

            script.onload = function() {
                window.dataLayer = window.dataLayer || [];
                function gtag(){dataLayer.push(arguments);}
                gtag('js', new Date());
                gtag('config', '{{ config.GA_MEASUREMENT_ID }}', {
                    'anonymize_ip': true,
                    'cookie_flags': 'SameSite=None;Secure'
                });
                window.gtag = gtag;
            };
        }

        // Sprawdź zgodę użytkownika
        {% if current_user.is_authenticated %}
            {% if current_user.analytics_consent %}
                loadGoogleAnalytics();
            {% elif current_user.should_show_cookie_banner %}
                window.showCookieBanner = true;
            {% endif %}
        {% else %}
            const consent = localStorage.getItem('analytics_consent');
            if (consent === 'accepted') {
                loadGoogleAnalytics();
            } else if (consent !== 'rejected') {
                window.showCookieBanner = true;
            }
        {% endif %}
    </script>
    {% endif %}

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{% block og_title %}ThunderOrders{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Albumy, photocards, pluszaki, kosmetyki i wiele więcej z Korei i Japonii!{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{{ url_for('static', filename='img/og-default.jpg', _external=True) }}{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:site_name" content="ThunderOrders">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">

    <!-- Custom CSS - Core & Components -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layouts/admin-layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/topbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/toasts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/modals.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/preloader.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cookie-banner.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/global-search.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    {% block extra_css %}{% endblock %}
</head>
<body class="offer-page-body">
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content" class="modal">
            <!-- Modal content will be inserted here -->
        </div>
    </div>

    <!-- Cookie Consent Banner -->
    {% include 'components/cookie_banner.html' %}

    {% block body_content %}
    <!-- Default content for pages without sidebar -->
    <main>
        {% block content %}{% endblock %}
    </main>
    {% endblock %}

    {% block scripts %}
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/core/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block extra_js %}{% endblock %}

    <!-- Flash messages as toasts -->
    <script>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    window.showToast({{ message|tojson }}, {{ category|tojson }});
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
    {% endblock %}
</body>
</html>
