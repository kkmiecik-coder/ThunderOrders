<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}ThunderOrders{% endblock %}</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{% block og_title %}ThunderOrders{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Albumy, photocards, pluszaki, kosmetyki i wiele więcej z Korei i Japonii!{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{{ url_for('static', filename='img/og-default.jpg', _external=True) }}{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:site_name" content="ThunderOrders">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">

    <!-- Custom CSS - Core & Components -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/core/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layouts/admin-layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/topbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/toasts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/modals.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/preloader.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cookie-banner.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/global-search.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    {% block body_content %}
    <main>
        {% block content %}{% endblock %}
    </main>
    {% endblock %}

    {% block scripts %}
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/core/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block extra_js %}{% endblock %}

    <!-- Flash messages as toasts -->
    <script>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    window.showToast({{ message|tojson }}, {{ category|tojson }});
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
    {% endblock %}
</body>
</html>
