{% extends "client/base_client.html" %}

{% block extra_css %}
{{ super() }}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/client/shop-checkout.css') }}">
{% endblock %}

{% block content %}
<div class="checkout-page">
    <!-- Back link -->
    <a href="{{ url_for('shop.index') }}" class="checkout-back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Wróć do sklepu
    </a>

    <h1 class="checkout-title">Podsumowanie zamówienia</h1>

    <div class="checkout-layout">
        <!-- Left: items + shipping -->
        <div class="checkout-items-section">
            <div class="checkout-items-list" id="checkoutItemsList">
                <!-- Populated by JS -->
            </div>
            <div class="checkout-items-loading" id="checkoutLoading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24" class="spin-icon"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Ładowanie...
            </div>

            <!-- Shipping section -->
            <div class="checkout-shipping-section">
                <label class="checkout-shipping-toggle" for="createShippingCheckbox">
                    <span class="checkout-shipping-checkbox-wrapper">
                        <input type="checkbox" id="createShippingCheckbox">
                        <span class="checkout-shipping-checkmark">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>
                        </span>
                    </span>
                    <span class="checkout-shipping-toggle-text">
                        <span class="checkout-shipping-toggle-title">Stwórz zlecenie wysyłki</span>
                        <span class="checkout-shipping-toggle-desc">Automatycznie utworzy zlecenie wysyłki z wybranym adresem dostawy</span>
                    </span>
                </label>

                <div class="checkout-address-picker" id="addressPicker" style="display:none;">
                    <label for="addressSelect" class="checkout-address-label">Adres dostawy</label>
                    <select id="addressSelect" class="checkout-address-select">
                        <option value="">Wybierz adres...</option>
                        {% for addr in addresses %}
                        <option value="{{ addr.id }}">{{ addr.display_name }} — {{ addr.full_address }}</option>
                        {% endfor %}
                    </select>
                    <a href="{{ url_for('client.shipping_addresses') }}" class="checkout-address-add-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Dodaj nowy adres
                    </a>
                </div>
            </div>
        </div>

        <!-- Right: summary sidebar -->
        <aside class="checkout-sidebar">
            <div class="checkout-summary-card">
                <h2 class="checkout-summary-title">Podsumowanie</h2>

                <div class="checkout-summary-row">
                    <span>Produkty:</span>
                    <span id="summaryCount">0 szt.</span>
                </div>
                <div class="checkout-summary-row checkout-summary-total">
                    <span>Razem:</span>
                    <span id="summaryTotal">0,00 PLN</span>
                </div>

                <button type="button" id="placeOrderBtn" class="checkout-place-btn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg> Złóż zamówienie
                </button>
            </div>
        </aside>
    </div>
</div>
{% endblock %}

{% block extra_js %}
{{ super() }}
<script src="{{ url_for('static', filename='js/pages/client/shop-checkout.js') }}"></script>
{% endblock %}
