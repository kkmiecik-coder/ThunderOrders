<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokończ rejestrację - ThunderOrders</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background-color: #F5F5F5; line-height: 1.6;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #F5F5F5; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; width: 100%; background-color: #FFFFFF; border-radius: 8px; overflow: hidden;">
                    <!-- Header with logo -->
                    <tr>
                        <td align="center" style="padding: 40px 40px 20px 40px;">
                            <img src="cid:logo@thunderorders" alt="ThunderOrders" style="height: 40px; width: auto; display: block;" />
                        </td>
                    </tr>
                    <!-- Main content -->
                    <tr>
                        <td style="padding: 20px 40px;">
                            <h1 style="margin: 0 0 20px 0; font-size: 24px; font-weight: 700; color: #240046; text-align: left;">
                                Dokończ rejestrację
                            </h1>
                            <p style="margin: 0 0 16px 0; font-size: 16px; color: #212121;">
                                Cześć{% if user_name %} <strong>{{ user_name }}</strong>{% endif %}!
                            </p>
                            <p style="margin: 0 0 24px 0; font-size: 16px; color: #212121;">
                                {{ message }}
                            </p>
                            <!-- CTA Button -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin: 24px 0;">
                                <tr>
                                    <td align="center">
                                        <a href="{{ action_url }}" style="display: inline-block; padding: 14px 32px; background-color: #7c3aed; color: #FFFFFF; text-decoration: none; font-size: 16px; font-weight: 600; border-radius: 8px;">
                                            {{ action_text }}
                                        </a>
                                    </td>
                                </tr>
                            </table>
                            <p style="margin: 24px 0 0 0; font-size: 14px; color: #757575;">
                                Jeśli nie rejestrowałeś/aś się na ThunderOrders, zignoruj tę wiadomość.
                            </p>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding: 20px 40px; border-top: 1px solid #E0E0E0;">
                            <p style="margin: 0; font-size: 12px; color: #9E9E9E; text-align: center;">
                                &copy; ThunderOrders. Ten email został wysłany automatycznie.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
