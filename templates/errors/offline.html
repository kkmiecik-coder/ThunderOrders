<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brak połączenia - ThunderOrders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #240046 0%, #3c096c 50%, #5a189a 100%);
            color: white;
        }
        .offline-container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .offline-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
        }
        .offline-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }
        .offline-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .offline-message {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .btn-refresh {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #ff8500;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-refresh:hover {
            background: #e07600;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 133, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <img src="/static/img/pwa/icon-192x192.png" alt="ThunderOrders" class="offline-logo">
        <div class="offline-icon">&#x1F4F5;</div>
        <h1 class="offline-title">Brak połączenia</h1>
        <p class="offline-message">
            Nie udało się połączyć z serwerem. Sprawdź połączenie z internetem i spróbuj ponownie.
        </p>
        <button class="btn-refresh" onclick="window.location.reload()">Odśwież stronę</button>
    </div>
</body>
</html>
