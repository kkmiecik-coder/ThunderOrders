<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brak połączenia - ThunderOrders</title>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/pages/auth/auth-scene.css">
    <link rel="stylesheet" href="/static/css/pages/errors.css">
</head>
<body class="auth-scene-body">
    <div class="scene auth-scene">
        <canvas id="particleCanvas"></canvas>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="stage-glow"></div>

        <div class="auth-center">
            <a href="/">
                <img src="/static/img/icons/logo-full.svg" alt="ThunderOrders" class="countdown-logo">
            </a>

            <div class="error-box">
                <div class="error-glass">
                    <h1 class="error-code" style="font-size: 3.5rem;">Offline</h1>
                    <h2 class="error-title">Brak połączenia!</h2>
                    <p class="error-message">Nie udało się połączyć z serwerem. Sprawdź swoje połączenie z internetem.</p>
                    <p class="error-joke">Burza poleca: „Sprawdź czy router jest podłączony, zanim zadzwonisz do IT. I tak każą wyłączyć i włączyć"</p>

                    <button class="error-btn" onclick="window.location.reload()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                        <span>Odśwież stronę</span>
                    </button>

                    <p class="error-footer">thunderorders.cloud</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/pages/auth/auth-particles.js"></script>
    <script>
        (function() {
            var box = document.querySelector('.error-box');
            if (!box) return;
            var angle = 0;
            function spin() {
                angle = (angle + 0.5) % 360;
                box.style.background = 'conic-gradient(from ' + angle + 'deg, #f093fb, #f5576c, #7b2cbf, #9d4edd, #f093fb)';
                requestAnimationFrame(spin);
            }
            spin();
        })();
    </script>
</body>
</html>
