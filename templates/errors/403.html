<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Brak dostępu</title>
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/pages/auth/auth-scene.css">
    <link rel="stylesheet" href="/static/css/pages/errors.css">
</head>
<body class="auth-scene-body">
    <div class="scene auth-scene">
        <canvas id="particleCanvas"></canvas>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="stage-glow"></div>

        <div class="auth-center">
            <a href="/">
                <img src="/static/img/icons/logo-full.svg" alt="ThunderOrders" class="countdown-logo">
            </a>

            <div class="error-box">
                <div class="error-glass">
                    <h1 class="error-code">403</h1>
                    <h2 class="error-title">Zakaz wstępu!</h2>
                    <p class="error-message">Nie masz uprawnień, żeby tu wejść. To strefa VIP.</p>
                    <p class="error-joke">Burza osobiście pilnuje tej strony. Nawet nie próbuj — ona ma oczy wszędzie.</p>

                    <a href="/" class="error-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        <span>Wróć tam, gdzie możesz być</span>
                    </a>

                    <p class="error-footer">thunderorders.cloud</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/pages/auth/auth-particles.js"></script>
    <script>
        (function() {
            var box = document.querySelector('.error-box');
            if (!box) return;
            var angle = 0;
            function spin() {
                angle = (angle + 0.5) % 360;
                box.style.background = 'conic-gradient(from ' + angle + 'deg, #f093fb, #f5576c, #7b2cbf, #9d4edd, #f093fb)';
                requestAnimationFrame(spin);
            }
            spin();
        })();
    </script>
</body>
</html>
