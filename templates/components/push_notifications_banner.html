<!-- Push Notifications Banner -->
<div id="push-notif-banner" class="push-notif-banner" style="display: none;">
    <div class="pwa-install-content">
        <img src="{{ url_for('static', filename='img/icons/bell.svg') }}" alt="Powiadomienia" class="push-notif-icon">
        <div class="pwa-install-text">
            <strong>Włącz powiadomienia</strong>
            <span>Bądź na bieżąco z zamówieniami</span>
        </div>
    </div>
    <div class="pwa-install-actions">
        <button id="push-notif-enable-btn" class="pwa-install-accept">Włącz</button>
        <button id="push-notif-dismiss-btn" class="pwa-install-dismiss">&times;</button>
    </div>
</div>
